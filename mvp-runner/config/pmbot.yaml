# PMBot 运行时配置
# 注意：appId / appSecret / chatId 不在这里，放 .env，防止误 commit
mention_keyword: PMCLI
allowed_users: []          # 空数组表示不限制；填 open_id 列表则启用白名单
default_slot: 0            # 未指定 #slot 时的默认槽位
response_max_chars: 2000   # 回贴飞书时的截断长度
response_timeout_ms: 90000 # waitResponse 超时（毫秒）
ack_on_receive: true       # 收到指令立即 ACK 给用户
online_notice: true        # 启动时向群里发上线通知

# 工作空间配置
workspaces_base_dir: "../workspaces"  # 工作空间基础目录（相对于 mvp-runner）
