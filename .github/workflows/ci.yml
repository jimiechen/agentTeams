name: CI Quality Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Unit Tests
        run: npx vitest run --coverage

      - name: Coverage Threshold (分层阈值)
        run: node scripts/check-coverage.js

      - name: No New TODOs
        run: |
          if git diff origin/main --name-only | grep -q 'src/'; then
            NEW_TODOS=$(git diff origin/main -- 'src/**/*.ts' | grep -c '^+.*TODO\|^+.*FIXME' || true)
            if [ "$NEW_TODOS" -gt 0 ]; then
              echo "::error::Found $NEW_TODOS new TODO/FIXME"
              exit 1
            fi
          fi

      - name: Log Format Check
        run: |
          ILLEGAL=$(grep -rn 'console\.log\|console\.error' src/ --include='*.ts' | grep -v '__tests__' || true)
          if [ -n "$ILLEGAL" ]; then
            echo "::warning::Found console.log/error, use logger instead"
          fi

      - name: Prompt Lint
        run: node scripts/lint-prompts.js --agents-dir .trae/agents/ --rules .trae/rules.md --registry prompts/registry.yaml

  e2e-tests:
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E Tests
        run: npm run test:e2e

  chaos-lite:
    runs-on: ubuntu-latest
    needs: quality-gate
    timeout-minutes: 3
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Chaos Lite Tests (沙箱隔离)
        run: npm run test:chaos:lite
        timeout-minutes: 2
